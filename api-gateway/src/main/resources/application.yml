spring:
  application:
    name: eduverse-api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # Course Catalog routes — Strangler Fig: routed to extracted course-catalog-service
        - id: courses
          uri: ${COURSE_CATALOG_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/courses/**
          filters:
            - StripPrefix=0
          metadata:
            feature-flag: ff-course-catalog
            target-service: course-catalog-service
            description: "Course catalog and management APIs (extracted microservice)"

        # Enrollment routes — Strangler Fig: routed to extracted enrollment-service
        - id: enrollments
          uri: ${ENROLLMENT_SERVICE_URL:http://localhost:8092}
          predicates:
            - Path=/api/enrollments/**
          filters:
            - StripPrefix=0
          metadata:
            feature-flag: ff-enrollment-service
            target-service: enrollment-service
            description: "Student enrollment lifecycle APIs (extracted microservice)"

        # Assessment routes — Strangler Fig: routed to extracted assessment-service
        - id: assessments
          uri: ${ASSESSMENT_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/assessments/**
          filters:
            - StripPrefix=0
          metadata:
            feature-flag: ff-assessment-service
            target-service: assessment-service
            description: "Quiz, exam, and assignment APIs (extracted microservice)"

        # Video routes — Strangler Fig: routed to extracted video-service
        - id: videos
          uri: ${VIDEO_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/videos/**
          filters:
            - StripPrefix=0
          metadata:
            feature-flag: ff-video-service
            target-service: video-service
            description: "Video upload, processing, and streaming APIs (extracted microservice)"

        # Certificate routes — Strangler Fig: routed to extracted certificate-service
        - id: certificates
          uri: ${CERTIFICATE_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/certificates/**
          filters:
            - StripPrefix=0
          metadata:
            feature-flag: ff-certificate-service
            target-service: certificate-service
            description: "Certificate generation and download APIs (extracted microservice)"

        # Payment routes — Strangler Fig: routed to extracted payment-service
        - id: payments
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0
          metadata:
            feature-flag: ff-payment-service
            target-service: payment-service
            description: "Payment processing and history APIs (extracted microservice)"

        # Notification routes — Strangler Fig: routed to extracted notification-service
        - id: notifications
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0
          metadata:
            feature-flag: ff-notification-service
            target-service: notification-service
            description: "Notification management APIs (extracted microservice)"

        # Student Progress routes — Strangler Fig: routed to extracted progress-service
        - id: progress
          uri: ${PROGRESS_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/progress/**
          filters:
            - StripPrefix=0
          metadata:
            feature-flag: ff-progress-service
            target-service: progress-service
            description: "Student progress tracking APIs (extracted microservice)"

        # Monolith fallback — catches all remaining traffic (JSP pages, static resources, etc.)
        - id: monolith-fallback
          uri: ${MONOLITH_URL:http://localhost:8080}
          predicates:
            - Path=/**
          filters:
            - StripPrefix=0
          metadata:
            description: "Fallback route to monolith for JSP pages and unmatched paths"

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

server:
  port: 8090

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.eduverse.gateway: DEBUG
