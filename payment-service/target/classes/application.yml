spring:
  application:
    name: payment-service

  # Database — own PostgreSQL database (Database-per-Service pattern)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/payments}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

  # Azure Service Bus (disabled by default for local dev)
  cloud:
    azure:
      servicebus:
        connection-string: ${SERVICEBUS_CONNECTION_STRING:}
        processor:
          student-enrolled:
            entity-name: student-enrolled
            entity-type: topic
            subscription-name: payment-service

server:
  port: ${SERVER_PORT:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.eduverse.payment: DEBUG
    com.azure.spring: INFO
