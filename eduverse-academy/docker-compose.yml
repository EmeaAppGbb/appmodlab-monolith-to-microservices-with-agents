# =============================================================================
# EduVerse Academy - Docker Compose
# Services: PostgreSQL 14, Tomcat application, pgAdmin (optional)
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d postgres app # Start without pgAdmin
#   docker-compose logs -f app        # Follow application logs
#   docker-compose down -v            # Stop and remove volumes
# =============================================================================

version: "3.9"

services:
  # ---------- PostgreSQL Database ----------
  postgres:
    image: postgres:14
    container_name: eduverse-postgres
    environment:
      POSTGRES_DB: eduverse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eduverse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduverse-net

  # ---------- Tomcat Application ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eduverse-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: eduverse
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JDBC_URL: jdbc:postgresql://postgres:5432/eduverse
    networks:
      - eduverse-net

  # ---------- pgAdmin (optional) ----------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eduverse-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eduverse.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - eduverse-net
    profiles:
      - tools

volumes:
  pgdata:

networks:
  eduverse-net:
    driver: bridge
