# =============================================================================
# EduVerse Academy - Docker Compose Override (Strangler Fig Gateway)
#
# Adds the API Gateway alongside the monolith. The gateway fronts all traffic
# and routes to the monolith by default. As microservices are extracted,
# routes are updated to point to the new services.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.override.yml up -d
#   curl http://localhost:8090/api/courses    # Through gateway
#   curl http://localhost:8080/api/courses    # Direct to monolith
# =============================================================================

version: "3.9"

services:
  # ---------- API Gateway (Strangler Fig) ----------
  gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: eduverse-gateway
    depends_on:
      app:
        condition: service_started
    ports:
      - "8090:8090"
    environment:
      MONOLITH_URL: http://eduverse-app:8080
      NOTIFICATION_SERVICE_URL: http://eduverse-notification-service:8084
      COURSE_CATALOG_SERVICE_URL: http://eduverse-course-catalog-service:8085
      PAYMENT_SERVICE_URL: http://eduverse-payment-service:8086
      VIDEO_SERVICE_URL: http://eduverse-video-service:8087
      CERTIFICATE_SERVICE_URL: http://eduverse-certificate-service:8088
      ASSESSMENT_SERVICE_URL: http://eduverse-assessment-service:8089
      PROGRESS_SERVICE_URL: http://eduverse-progress-service:8091
      ENROLLMENT_SERVICE_URL: http://eduverse-enrollment-service:8092
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eduverse-net

  # ---------- Notification Service Database ----------
  notification-db:
    image: postgres:14
    container_name: eduverse-notification-db
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - notification-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduverse-net

  # ---------- Notification Service (Strangler Fig — Phase 1) ----------
  notification-service:
    build:
      context: ../notification-service
      dockerfile: Dockerfile
    container_name: eduverse-notification-service
    depends_on:
      notification-db:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://notification-db:5432/notifications
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      MAIL_HOST: ${MAIL_HOST:-smtp.eduverse.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-notifications@eduverse.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      SERVICEBUS_CONNECTION_STRING: ${SERVICEBUS_CONNECTION_STRING:-}
      SERVER_PORT: 8084
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
